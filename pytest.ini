[pytest]
# Use a local (non-OneDrive) temp directory to avoid the WinError 448
# symlink cleanup issue that occurs when pytest runs inside an OneDrive-synced
# folder on Windows 11.
basetemp = C:/Windows/Temp/billet_ocr_pytest

# Mark definitions so -m "not slow" works without warnings.
markers =
    slow: marks tests as slow (requires PaddleOCR model loading -- deselect with -m 'not slow')
